name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Lowercase the image name (Docker requires all-lowercase)
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Set up Docker Buildx (highly recommended for modern docker builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to GitHub Container Registry (except on Pull Requests)
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build and push Docker image with Buildx (push on tag or push to main, not on PR)
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance disabled to produce a single-manifest image (not an index)
          # This ensures `docker pull` gets the image directly without manifest-list issues
          provenance: false

      # Verify the image health after push (only on main branch push)
      - name: Verify Docker image starts correctly
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Pulling and testing the published image..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          # Start container in background
          docker run -d --name test-container \
            -p 8000:8000 \
            -e PORT=8000 \
            -e FIREWORKS_API_KEY=fw_test_key_placeholder \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          # Wait for health check (max 60 seconds)
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Container is healthy after ${i}s"
              docker stop test-container
              docker rm test-container
              exit 0
            fi
            sleep 1
          done
          
          echo "❌ Container failed to become healthy in 60s"
          docker logs test-container
          docker stop test-container
          docker rm test-container
          exit 1

